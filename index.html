<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Candlelit Pages · a cozy book blog</title>
<meta name="description" content="Candlelit Pages: cozy book reviews, honest reading habits, and candlelit aesthetics." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,400&family=Karla:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment: #F1EBDD;
    --paper: #F7F3E9;
    --ink: #35402F;
    --sage: #7C8B6F;
    --deep-sage: #55634B;
    --tan: #C8A87E;
    --soft-tan: #E3D3B8;
    --amber: #E0A458;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--parchment);
    color: var(--ink);
    font-family: 'Karla', sans-serif;
    line-height: 1.65;
    min-height: 100vh;
  }

  .serif { font-family: 'Fraunces', serif; }

  /* ---- Bookmark ribbon nav (signature) ---- */
  .ribbon-bar {
    display: flex;
    justify-content: center;
    gap: 22px;
  }
  .ribbon {
    position: relative;
    border: none;
    cursor: pointer;
    font-family: 'Karla', sans-serif;
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--paper);
    padding: 34px 18px 20px 18px;
    clip-path: polygon(0 0, 100% 0, 100% 100%, 50% calc(100% - 12px), 0 100%);
    transition: padding-top 0.25s ease, filter 0.25s ease;
  }
  .ribbon:hover { padding-top: 46px; filter: brightness(1.06); }
  .ribbon:focus-visible { outline: 3px solid var(--amber); outline-offset: 2px; }
  .ribbon.active { padding-top: 52px; }
  .ribbon-sage { background: var(--deep-sage); }
  .ribbon-tan { background: var(--tan); color: var(--ink); }
  .ribbon-mid { background: var(--sage); }

  /* ---- Candle flame ---- */
  .candle-wrap { display: flex; flex-direction: column; align-items: center; width: 46px; }
  .flame {
    width: 14px; height: 22px;
    background: radial-gradient(circle at 50% 75%, var(--amber) 0%, #f3c98a 55%, transparent 75%);
    border-radius: 50% 50% 50% 50% / 62% 62% 38% 38%;
    animation: flicker 2.4s ease-in-out infinite;
    transform-origin: 50% 100%;
  }
  @keyframes flicker {
    0%, 100% { transform: scaleY(1) rotate(0deg); opacity: 0.95; }
    30% { transform: scaleY(1.12) rotate(-2deg); opacity: 1; }
    55% { transform: scaleY(0.92) rotate(2deg); opacity: 0.85; }
    80% { transform: scaleY(1.06) rotate(-1deg); opacity: 0.95; }
  }
  .candle-body {
    width: 22px; height: 42px;
    background: linear-gradient(180deg, var(--paper), var(--soft-tan));
    border-radius: 4px 4px 6px 6px;
    margin-top: -3px;
    box-shadow: inset 0 -6px 10px rgba(60,50,30,0.12);
  }
  .wick { width: 2px; height: 6px; background: #5a4632; margin-top: -2px; }

  .fade-in { animation: rise 0.7s ease both; }
  @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

  /* ---- Shared layout ---- */
  .wrap { max-width: 1020px; margin: 0 auto; padding: 0 24px; }
  .eyebrow {
    font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--deep-sage); font-weight: 600;
  }
  .rule { border: none; border-top: 1px solid var(--soft-tan); margin: 56px 0; }

  /* ---- Bookshelf ---- */
  .shelf-row { display: flex; align-items: flex-end; gap: 6px; flex-wrap: wrap; justify-content: center; }
  .spine {
    writing-mode: vertical-rl;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif;
    font-size: 13px;
    width: 44px;
    padding: 14px 0;
    border-radius: 3px 3px 0 0;
    box-shadow: inset -3px 0 6px rgba(0,0,0,0.12);
    transition: transform 0.2s ease;
    cursor: default;
  }
  .spine:hover { transform: translateY(-8px); }
  .shelf-board {
    height: 12px;
    background: linear-gradient(180deg, #a9825a, #8a6845);
    border-radius: 2px;
    box-shadow: 0 6px 10px rgba(90,70,45,0.25);
  }

  /* ---- Cards ---- */
  .card {
    background: var(--paper);
    border: 1px solid var(--soft-tan);
    border-radius: 14px;
    padding: 28px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(85,99,75,0.12); }
  .tag {
    display: inline-block;
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600;
    background: var(--soft-tan); color: var(--ink);
    padding: 4px 10px; border-radius: 999px;
  }
  .tag.green { background: #dde4d4; color: var(--deep-sage); }

  /* ---- Gallery ---- */
  .polaroid {
    background: var(--paper);
    border: 1px solid var(--soft-tan);
    padding: 12px 12px 16px;
    border-radius: 6px;
    box-shadow: 0 8px 18px rgba(85,99,75,0.10);
    transition: transform 0.25s ease;
  }
  .polaroid:hover { transform: rotate(0deg) translateY(-6px) !important; }
  .polaroid .photo { height: 210px; border-radius: 3px; position: relative; overflow: hidden; }
  .photo-sheen {
    position: absolute; inset: 0;
    background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.35), transparent 55%);
  }

  /* ---- Buttons / links ---- */
  .social-btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-weight: 600; font-size: 14px;
    color: var(--paper); background: var(--deep-sage);
    padding: 10px 20px; border-radius: 999px;
    text-decoration: none;
    transition: background 0.2s ease;
  }
  .social-btn:hover { background: var(--sage); }
  .social-btn.tan { background: var(--tan); color: var(--ink); }
  .social-btn.tan:hover { background: var(--soft-tan); }

  .link-btn {
    background: none; border: none; cursor: pointer;
    font-family: 'Karla', sans-serif; font-weight: 600; font-size: 14px;
    color: var(--deep-sage);
  }
  .read-btn { border-bottom: 2px solid var(--tan); padding-bottom: 2px; }

  .grid-fill { display: grid; gap: 24px; }
  .grid-posts { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
  .grid-gallery { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 28px; }
  .about-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; align-items: center; }

  footer {
    border-top: 1px solid var(--soft-tan);
    padding: 28px 0;
    text-align: center;
  }

  @media (max-width: 640px) {
    .ribbon { padding: 26px 12px 16px; font-size: 11px; }
    .hero-title { font-size: 42px !important; }
  }

  @media (prefers-reduced-motion: reduce) {
    .ribbon, .flame, .fade-in, .spine, .card, .polaroid, .social-btn { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>

<nav class="ribbon-bar" aria-label="Main navigation" id="nav"></nav>
<main id="view"></main>

<footer>
  <div class="serif" style="font-size:18px;font-weight:600;">Candlelit Pages</div>
  <p style="font-size:13px;color:var(--deep-sage);margin-top:6px;">Written between chapters · © 2026</p>
</footer>

<script>
/* =========================================================================
   CANDLELIT PAGES — content lives here. Edit these three lists to update
   the site. No other code needs to change.
   ========================================================================= */

/* --- Your social links --- */
var LINKS = {
  instagram: "https://instagram.com",
  youtube: "https://youtube.com"
};

/* --- Recently read books (the shelf on the home page) ---
   color = spine color, text = lettering color, h = spine height in px  */
var recentReads = [
  { title: "King of Sloth", color: "#55634B", text: "#F7F3E9", h: 210 },
  { title: "The Heir Apparent", color: "#C8A87E", text: "#35402F", h: 185 },
  { title: "Queen of Shadows", color: "#7C8B6F", text: "#F7F3E9", h: 165 },
  { title: "The Assassin's Blade", color: "#9BAA8C", text: "#35402F", h: 200 },
  { title: "Heir of Fire", color: "#E3D3B8", text: "#35402F", h: 175 },
  { title: "Rise of a Queen", color: "#6B7A5E", text: "#F7F3E9", h: 220 }
];

/* --- Blog posts ---
   tag/green = label pill, body = list of blocks.
   Start a block with "## " for a heading, "> " for a pull quote,
   anything else is a normal paragraph.  */
var posts = [
  {
    slug: "cozy-fantasy-summer",
    tag: "Review", green: true, date: "June 28, 2026",
    title: "Five Cozy Fantasy Reads for Slow Summer Evenings",
    excerpt: "Low stakes, warm hearts, and at least one enchanted coffee shop. These are the books I reach for when the world feels a little too loud.",
    time: "6 min read",
    body: [
      "This is placeholder text for your post. Replace it with your real writing whenever you're ready. Everything below shows how a finished article will look, so you can see the spacing, headings, and pull quotes in action.",
      "Cozy fantasy is the genre I return to when I want a story that feels like a warm drink on a rainy afternoon. The stakes are gentle, the characters are kind, and nobody is trying to end the world before breakfast.",
      "## What makes a read truly cozy",
      "A cozy book usually has a few things in common: a strong sense of place, characters who genuinely like each other, and a plot that leaves room to breathe. You can swap this section for your own thoughts.",
      "> The best cozy fantasy doesn't lower the stakes. It changes what the stakes are about.",
      "Add as many paragraphs as you like here. When you write your real post, just replace each line in this list with your own sentences, and the page formatting will take care of the rest.",
      "## The short list",
      "Here is where you'd introduce your five picks, one at a time, with a sentence or two on why each earned a place. For now, imagine your favorites sitting right here, waiting to be recommended."
    ]
  },
  {
    slug: "how-i-annotate",
    tag: "Reading Life", green: false, date: "June 15, 2026",
    title: "How I Annotate Without Ruining the Reading Experience",
    excerpt: "Sticky tabs, a pencil I never sharpen, and one rule I refuse to break. My honest system for marking up the books I love most.",
    time: "4 min read",
    body: [
      "This is placeholder text. Swap it for your real annotation system whenever you're ready to write this one up.",
      "For a long time I was afraid to write in books. It felt like defacing something sacred. Then I realized that the notes are part of how I fall in love with a story, not a threat to it.",
      "## My gentle toolkit",
      "A soft pencil, a stack of sticky tabs in colors I actually like, and patience. Describe your own kit here, or list the exact supplies you reach for.",
      "> A book you've written in is a book you've had a conversation with.",
      "You can add or remove paragraphs freely. Each line in the post's body becomes its own block on the page."
    ]
  },
  {
    slug: "divine-rivals-love-letter",
    tag: "Review", green: true, date: "June 2, 2026",
    title: "A Spoiler-Free Love Letter to Divine Rivals",
    excerpt: "Rival journalists, enchanted typewriters, and a slow burn that actually earns the name. Here is why this one lives on my favorites shelf.",
    time: "5 min read",
    body: [
      "Placeholder text goes here. Replace it with your real spoiler-free review.",
      "Some books you finish and set down. Others you finish and immediately press against your chest for a moment. This was firmly the second kind for me.",
      "## Why the slow burn works",
      "Explain, in your own words, what made the romance land. Keep it spoiler-free so new readers can enjoy the ride.",
      "> A love letter, not a spoiler. That's the whole goal of this review.",
      "Fill in as much as you'd like. When you publish the real thing, this placeholder simply disappears."
    ]
  },
  {
    slug: "rainy-day-tbr",
    tag: "Lists", green: false, date: "May 20, 2026",
    title: "Building the Perfect Rainy Day TBR",
    excerpt: "A gentle framework for stacking your to-be-read pile so there is always a right book for the mood, the weather, and the hour.",
    time: "7 min read",
    body: [
      "This is placeholder body text for your list post. Replace it with your own framework.",
      "A good to-be-read pile isn't a chore list. It's a promise to your future self that whatever mood arrives, there's a right book waiting.",
      "## Sort by mood, not by deadline",
      "Describe your own approach to organizing a TBR here. Maybe you sort by season, by feeling, or by how much brainpower a book asks for.",
      "> The right book at the wrong time is just the wrong book.",
      "Keep going for as long as the topic deserves. Every paragraph you add here shows up cleanly on the reading page."
    ]
  }
];

/* --- Gallery photos ---
   To use a real photo, replace `bg` with:  "url('photos/your-image.jpg') center/cover"
   (put the image file next to this HTML file, e.g. in a /photos folder).  */
var gallery = [
  { caption: "morning chapters",         tilt: -2,   bg: "linear-gradient(160deg, #E3D3B8, #C8A87E)" },
  { caption: "the annotation kit",       tilt: 1.5,  bg: "linear-gradient(200deg, #dde4d4, #7C8B6F)" },
  { caption: "candlelight & poetry",     tilt: -1,   bg: "linear-gradient(180deg, #F7F3E9, #E0A45855)" },
  { caption: "library haul day",         tilt: 2,    bg: "linear-gradient(150deg, #7C8B6F, #55634B)" },
  { caption: "rainy window reads",       tilt: -1.5, bg: "linear-gradient(170deg, #E3D3B8, #9BAA8C)" },
  { caption: "shelf reorganizing (again)", tilt: 1,  bg: "linear-gradient(190deg, #C8A87E, #55634B)" }
];

/* =========================================================================
   Rendering — you shouldn't need to edit below this line.
   ========================================================================= */

function esc(s) {
  return String(s).replace(/[&<>"']/g, function (c) {
    return { "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c];
  });
}

var NAV = [
  { id: "home", label: "Home", cls: "ribbon-sage" },
  { id: "blog", label: "Blog", cls: "ribbon-tan" },
  { id: "gallery", label: "Gallery", cls: "ribbon-mid" }
];

var state = { page: "home", slug: null };

function renderNav() {
  var activeId = state.slug ? "blog" : state.page;
  document.getElementById("nav").innerHTML = NAV.map(function (n) {
    var active = activeId === n.id ? " active" : "";
    var current = activeId === n.id ? ' aria-current="page"' : "";
    return '<button class="ribbon ' + n.cls + active + '" data-nav="' + n.id + '"' + current + '>' + n.label + '</button>';
  }).join("");
}

function candle() {
  return '<div class="candle-wrap" aria-hidden="true"><div class="flame"></div><div class="wick"></div><div class="candle-body"></div></div>';
}

function renderHome() {
  var shelf = recentReads.map(function (b) {
    var label = b.title.length > 26 ? esc(b.title.slice(0, 24)) + "…" : esc(b.title);
    return '<div class="spine" title="' + esc(b.title) + '" style="background:' + b.color + ';color:' + b.text + ';height:' + b.h + 'px;">' + label + '</div>';
  }).join("");

  return '' +
  '<div class="fade-in">' +
    '<section style="text-align:center;padding:72px 0 24px;">' +
      '<div style="display:flex;justify-content:center;margin-bottom:18px;">' + candle() + '</div>' +
      '<div class="eyebrow">a book blog for the softly lit hours</div>' +
      '<h1 class="serif hero-title" style="font-size:64px;font-weight:600;margin:14px 0 16px;letter-spacing:-0.01em;">Candlelit Pages</h1>' +
      '<p style="max-width:560px;margin:0 auto;font-size:17px;color:var(--deep-sage);">Cozy reviews, honest reading habits, and the occasional dramatic opinion about fictional people. Pull up a blanket and stay a while.</p>' +
      '<div style="display:flex;gap:12px;justify-content:center;margin-top:28px;flex-wrap:wrap;">' +
        '<a class="social-btn" href="' + LINKS.instagram + '" target="_blank" rel="noreferrer">Instagram ↗</a>' +
        '<a class="social-btn tan" href="' + LINKS.youtube + '" target="_blank" rel="noreferrer">YouTube ↗</a>' +
      '</div>' +
    '</section>' +
    '<div class="wrap">' +
      '<hr class="rule" />' +
      '<section class="about-grid">' +
        '<div>' +
          '<div class="eyebrow">Behind the camera</div>' +
          '<h2 class="serif" style="font-size:32px;font-weight:600;margin:10px 0 14px;">Hi, I\'m the reader here.</h2>' +
          '<p style="margin-bottom:12px;">I started Candlelit Pages as a quiet corner for the books that keep me up past a reasonable hour. Expect a soft spot for cozy fantasy, young adult romance with actual stakes, and any story with a library in it.</p>' +
          '<p>When I\'m not reading, I\'m annotating, rearranging my shelves, or drafting a review in my head mid-chapter. This blog is where all of that lands.</p>' +
        '</div>' +
        '<div class="card" style="text-align:center;">' +
          '<div class="eyebrow" style="margin-bottom:10px;">Currently reading</div>' +
          '<div class="serif" style="font-size:24px;font-weight:600;">A Placeholder of Fire and Prose</div>' +
          '<p style="color:var(--deep-sage);margin:8px 0 14px;">Chapter 14 of 32 · loving it so far</p>' +
          '<div style="height:8px;background:var(--soft-tan);border-radius:999px;"><div style="width:44%;height:100%;background:var(--sage);border-radius:999px;"></div></div>' +
        '</div>' +
      '</section>' +
      '<hr class="rule" />' +
      '<section style="padding-bottom:80px;">' +
        '<div class="eyebrow" style="text-align:center;">Recently read</div>' +
        '<h2 class="serif" style="font-size:32px;font-weight:600;text-align:center;margin:10px 0 36px;">The latest additions to the shelf</h2>' +
        '<div style="max-width:720px;margin:0 auto;">' +
          '<div class="shelf-row">' + shelf + '</div>' +
          '<div class="shelf-board"></div>' +
          '<p style="text-align:center;color:var(--deep-sage);margin-top:18px;font-size:14px;">Hover a spine for the full title. Full thoughts live on the blog.</p>' +
        '</div>' +
      '</section>' +
    '</div>' +
  '</div>';
}

function renderBlog() {
  var cards = posts.map(function (p) {
    var tagCls = p.green ? "tag green" : "tag";
    return '' +
    '<article class="card">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">' +
        '<span class="' + tagCls + '">' + esc(p.tag) + '</span>' +
        '<span style="font-size:13px;color:var(--deep-sage);">' + esc(p.date) + '</span>' +
      '</div>' +
      '<h2 class="serif" style="font-size:24px;font-weight:600;margin-bottom:10px;line-height:1.3;">' + esc(p.title) + '</h2>' +
      '<p style="color:#4c5744;margin-bottom:16px;">' + esc(p.excerpt) + '</p>' +
      '<div style="display:flex;justify-content:space-between;align-items:center;">' +
        '<span style="font-size:13px;color:var(--deep-sage);">' + esc(p.time) + '</span>' +
        '<button class="link-btn read-btn" data-post="' + p.slug + '">Read the post</button>' +
      '</div>' +
    '</article>';
  }).join("");

  return '' +
  '<div class="wrap fade-in" style="padding-bottom:80px;">' +
    '<header style="text-align:center;padding:64px 0 48px;">' +
      '<div class="eyebrow">The blog</div>' +
      '<h1 class="serif" style="font-size:44px;font-weight:600;margin:12px 0 10px;">Notes from the reading chair</h1>' +
      '<p style="max-width:520px;margin:0 auto;color:var(--deep-sage);">Reviews, reading habits, and lists written between chapters.</p>' +
    '</header>' +
    '<div class="grid-fill grid-posts">' + cards + '</div>' +
  '</div>';
}

function renderPost() {
  var p = null;
  for (var i = 0; i < posts.length; i++) { if (posts[i].slug === state.slug) { p = posts[i]; break; } }
  if (!p) return renderBlog();

  var body = p.body.map(function (block) {
    if (block.indexOf("## ") === 0) {
      return '<h2 class="serif" style="font-size:26px;font-weight:600;margin:36px 0 12px;">' + esc(block.slice(3)) + '</h2>';
    }
    if (block.indexOf("> ") === 0) {
      return '<blockquote class="serif" style="border-left:3px solid var(--tan);padding-left:20px;margin:28px 0;font-size:22px;font-style:italic;color:var(--deep-sage);line-height:1.5;">' + esc(block.slice(2)) + '</blockquote>';
    }
    return '<p style="margin-bottom:20px;color:#3f4a37;">' + esc(block) + '</p>';
  }).join("");

  var tagCls = p.green ? "tag green" : "tag";

  return '' +
  '<div class="wrap fade-in" style="padding-bottom:80px;max-width:720px;">' +
    '<button class="link-btn" data-nav="blog" style="margin:48px 0 8px;padding:0;">← Back to all posts</button>' +
    '<article>' +
      '<header style="padding:16px 0 32px;">' +
        '<div style="display:flex;gap:12px;align-items:center;margin-bottom:16px;">' +
          '<span class="' + tagCls + '">' + esc(p.tag) + '</span>' +
          '<span style="font-size:13px;color:var(--deep-sage);">' + esc(p.date) + ' · ' + esc(p.time) + '</span>' +
        '</div>' +
        '<h1 class="serif" style="font-size:40px;font-weight:600;line-height:1.2;">' + esc(p.title) + '</h1>' +
      '</header>' +
      '<div style="font-size:17.5px;">' + body + '</div>' +
      '<hr class="rule" style="margin:48px 0 24px;" />' +
      '<p class="serif" style="color:var(--deep-sage);font-style:italic;">Thanks for reading along at Candlelit Pages.</p>' +
    '</article>' +
  '</div>';
}

function renderGallery() {
  var cells = gallery.map(function (g) {
    return '' +
    '<figure class="polaroid" style="transform:rotate(' + g.tilt + 'deg);">' +
      '<div class="photo" style="background:' + g.bg + ';"><div class="photo-sheen"></div></div>' +
      '<figcaption class="serif" style="text-align:center;margin-top:12px;font-size:16px;font-style:italic;">' + esc(g.caption) + '</figcaption>' +
    '</figure>';
  }).join("");

  return '' +
  '<div class="wrap fade-in" style="padding-bottom:80px;">' +
    '<header style="text-align:center;padding:64px 0 48px;">' +
      '<div class="eyebrow">The gallery</div>' +
      '<h1 class="serif" style="font-size:44px;font-weight:600;margin:12px 0 10px;">Shelf life, in pictures</h1>' +
      '<p style="max-width:520px;margin:0 auto;color:var(--deep-sage);">Cozy corners, book hauls, and candlelit stacks. Swap these placeholders for your own photos.</p>' +
    '</header>' +
    '<div class="grid-fill grid-gallery">' + cells + '</div>' +
  '</div>';
}

function render() {
  renderNav();
  var v = document.getElementById("view");
  if (state.slug) { v.innerHTML = renderPost(); }
  else if (state.page === "home") { v.innerHTML = renderHome(); }
  else if (state.page === "blog") { v.innerHTML = renderBlog(); }
  else if (state.page === "gallery") { v.innerHTML = renderGallery(); }
  window.scrollTo(0, 0);
}

/* Single delegated click handler for nav + post buttons */
document.addEventListener("click", function (e) {
  var navBtn = e.target.closest("[data-nav]");
  if (navBtn) { state.slug = null; state.page = navBtn.getAttribute("data-nav"); render(); return; }
  var postBtn = e.target.closest("[data-post]");
  if (postBtn) { state.slug = postBtn.getAttribute("data-post"); render(); return; }
});

render();
</script>
</body>
</html>
